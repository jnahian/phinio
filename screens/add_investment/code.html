<body class="bg-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 backdrop-blur-xl bg-[#0b1326]/80 flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-blue-50/10 active:scale-95 duration-200 text-on-surface">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Manrope'] text-lg font-semibold tracking-tight text-on-surface">Edit Investment</h1>
</div>
<div class="flex items-center gap-2">
<button class="material-symbols-outlined text-blue-600 dark:text-blue-500 hover:bg-blue-50/10 p-2 rounded-full active:scale-95 duration-200">notifications</button>
<div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant/30">

</div>
</div>

<main class="max-w-2xl mx-auto px-6 py-8 pb-32">
<!-- Hero Input Section -->
<div class="mb-12 space-y-2">
<label class="font-headline text-sm font-semibold tracking-wider text-primary uppercase ml-1">Current Value</label>
<div class="relative group">
<span class="absolute left-0 top-1/2 -translate-y-1/2 font-headline text-4xl font-bold text-on-surface-variant/40">$</span>
<input class="w-full bg-transparent border-none focus:ring-0 font-headline text-6xl font-extrabold tracking-tighter text-on-surface pl-8 pb-2" placeholder="0.00" type="text" value="12,450.00"/>
<div class="h-px w-full bg-gradient-to-r from-primary-container to-transparent opacity-30 group-focus-within:opacity-100 transition-opacity"></div>
</div>
</div>
<!-- Form Cards - Using Tonal Layering instead of borders -->
<div class="space-y-6">
<!-- Asset Details Section -->
<section class="bg-surface-container-low rounded-3xl p-6 space-y-6">
<div class="space-y-4">
<label class="block font-headline text-xs font-bold text-outline uppercase tracking-widest">Asset Details</label>
<div class="space-y-2">
<p class="text-on-surface-variant text-sm font-medium px-1">Asset Name</p>
<div class="bg-surface-container-lowest rounded-2xl p-4 flex items-center gap-3 group focus-within:ring-1 ring-primary/30 transition-all">
<span class="material-symbols-outlined text-primary">account_balance</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface font-medium placeholder:text-outline/50" placeholder="Enter asset name" type="text" value="Vanguard S&amp;P 500 ETF"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<p class="text-on-surface-variant text-sm font-medium px-1">Invested Amount</p>
<div class="bg-surface-container-lowest rounded-2xl p-4 flex items-center gap-3 group focus-within:ring-1 ring-primary/30 transition-all">
<span class="material-symbols-outlined text-secondary">payments</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface font-medium" placeholder="0.00" type="text" value="10,000.00"/>
</div>
</div>
<div class="space-y-2">
<p class="text-on-surface-variant text-sm font-medium px-1">Date</p>
<div class="bg-surface-container-lowest rounded-2xl p-4 flex items-center gap-3 group focus-within:ring-1 ring-primary/30 transition-all">
<span class="material-symbols-outlined text-outline">calendar_today</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface font-medium" type="text" value="Oct 24, 2023"/>
</div>
</div>
</div>
</div>
</section>
<!-- Category Selector Section -->
<section class="bg-surface-container-low rounded-3xl p-6 space-y-4">
<label class="block font-headline text-xs font-bold text-outline uppercase tracking-widest">Investment Category</label>
<div class="grid grid-cols-2 md:grid-cols-4 gap-3">
<!-- Category Item Active -->
<button class="bg-primary-container text-on-primary-container p-4 rounded-2xl flex flex-col items-center gap-2 active:scale-95 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">show_chart</span>
<span class="text-xs font-bold">Stocks</span>
</button>
<!-- Category Item -->
<button class="bg-surface-container-lowest text-on-surface-variant p-4 rounded-2xl flex flex-col items-center gap-2 hover:bg-surface-container-high active:scale-95 transition-all">
<span class="material-symbols-outlined">payments</span>
<span class="text-xs font-bold">Cash</span>
</button>
<!-- Category Item -->
<button class="bg-surface-container-lowest text-on-surface-variant p-4 rounded-2xl flex flex-col items-center gap-2 hover:bg-surface-container-high active:scale-95 transition-all">
<span class="material-symbols-outlined">monetization_on</span>
<span class="text-xs font-bold">Gold</span>
</button>
<!-- Category Item -->
<button class="bg-surface-container-lowest text-on-surface-variant p-4 rounded-2xl flex flex-col items-center gap-2 hover:bg-surface-container-high active:scale-95 transition-all">
<span class="material-symbols-outlined">apartment</span>
<span class="text-xs font-bold">REITs</span>
</button>
</div>
</section>
<!-- Metadata Section -->
<section class="bg-surface-container-low rounded-3xl p-6 space-y-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline">description</span>
<span class="text-sm font-medium text-on-surface">Add Notes</span>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</div>
<div class="h-px bg-outline-variant/10"></div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline">sell</span>
<span class="text-sm font-medium text-on-surface">Tags</span>
</div>
<div class="flex gap-2">
<span class="bg-surface-container-highest text-[10px] font-bold px-2 py-1 rounded-full text-primary tracking-tight">LONG-TERM</span>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</div>
</div>
</section>
<!-- Danger Zone -->
<div class="px-6 py-2">
<button class="text-tertiary text-sm font-semibold flex items-center gap-2 opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-sm">delete</span>
                    Remove Investment
                </button>
</div>
</div>
<!-- Primary Action -->
<div class="fixed bottom-10 left-6 right-6 max-w-2xl mx-auto z-40">
<button class="w-full bg-primary-container text-on-primary-container h-16 rounded-3xl font-headline font-bold text-lg shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition-transform">
                Save Investment
                <span class="material-symbols-outlined">check_circle</span>
</button>
</div>
